<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZAYN-MD Session Generator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #e0e0e0;
    }

    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 40px;
      max-width: 460px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 6px;
      color: #fff;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 28px;
    }

    #qr-container {
      min-height: 264px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }

    #qr-container img {
      width: 264px;
      height: 264px;
      border-radius: 12px;
      border: 2px solid #2a2a4a;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #2a2a4a;
      border-top-color: #6c63ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .status {
      font-size: 0.9rem;
      color: #aaa;
      margin-bottom: 16px;
    }

    .status.success { color: #4ade80; }
    .status.error { color: #f87171; }

    #session-area {
      display: none;
      margin-top: 16px;
    }

    #session-area textarea {
      width: 100%;
      height: 100px;
      background: #111;
      color: #6c63ff;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 12px;
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      resize: none;
      word-break: break-all;
    }

    .btn {
      display: inline-block;
      margin-top: 12px;
      padding: 10px 28px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover { background: #5a52d5; }
    .btn:active { transform: scale(0.97); }

    .btn.copied {
      background: #4ade80;
      color: #000;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>ZAYN-MD</h1>
    <p class="subtitle">Scan the QR code with WhatsApp to generate your Session ID</p>

    <div id="qr-container">
      <div class="spinner" id="spinner"></div>
    </div>

    <p class="status" id="status">Waiting for QR code...</p>

    <div id="session-area">
      <textarea id="session-id" readonly></textarea>
      <button class="btn" id="copy-btn" onclick="copySession()">Copy Session ID</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const qrContainer = document.getElementById('qr-container');
    const spinner = document.getElementById('spinner');
    const status = document.getElementById('status');
    const sessionArea = document.getElementById('session-area');
    const sessionId = document.getElementById('session-id');
    const copyBtn = document.getElementById('copy-btn');

    socket.on('qr', (dataUrl) => {
      spinner.style.display = 'none';

      let img = qrContainer.querySelector('img');
      if (!img) {
        img = document.createElement('img');
        qrContainer.appendChild(img);
      }
      img.src = dataUrl;

      status.textContent = 'Scan this QR code with WhatsApp';
      status.className = 'status';
    });

    socket.on('session-id', (id) => {
      qrContainer.style.display = 'none';
      status.textContent = 'Session generated successfully!';
      status.className = 'status success';
      sessionArea.style.display = 'block';
      sessionId.value = id;
    });

    socket.on('timeout', (msg) => {
      qrContainer.innerHTML = '';
      status.textContent = msg;
      status.className = 'status error';
    });

    socket.on('error', (msg) => {
      status.textContent = msg;
      status.className = 'status error';
    });

    function copySession() {
      navigator.clipboard.writeText(sessionId.value).then(() => {
        copyBtn.textContent = 'Copied!';
        copyBtn.classList.add('copied');
        setTimeout(() => {
          copyBtn.textContent = 'Copy Session ID';
          copyBtn.classList.remove('copied');
        }, 2000);
      });
    }
  </script>
</body>
</html>
